name: propix8
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.8


dependencies:
  app_links: ^7.0.0
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.2
  chewie: ^1.13.0
  dartz: ^0.10.1
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_screenutil: ^5.9.3
  geocoding: ^4.0.0
  geolocator: ^14.0.3
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  internet_state_manager: ^1.10.1+3
  intl: ^0.20.2
  latlong2: ^0.9.1
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.5.5
  skeletonizer: ^2.1.3
  video_player: ^2.11.1
  flutter_native_splash: ^2.4.7
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  go_router: ^17.2.0
  url_launcher: ^6.3.2
  visibility_detector: ^0.4.0+2
  connectivity_plus: ^7.1.1
  loading_animation_widget: ^1.3.0
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.8.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#3E5879"
  adaptive_icon_foreground: "assets/images/logo.png"
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
